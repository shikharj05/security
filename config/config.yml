    #         backend_roles: roles
    #         email: email
    #         display_name: name
    #   
    #   # Kerberos authentication
    #   - type: kerberos
    #     enabled: false
    #     order: 5
    #     description: "Authenticate via Kerberos/SPNEGO"
    #     config:
    #       krb_debug: false
    #       strip_realm_from_principal: true
    #       # Kerberos configuration in opensearch.yml:
    #       # plugins.security.kerberos.krb5_filepath
    #       # plugins.security.kerberos.acceptor_keytab_filepath
    #       # plugins.security.kerberos.acceptor_principal
    
    # NEW AUTHORIZATION PLUGIN CONFIGURATION (recommended for new deployments)
    # Authorization plugins make access control decisions based on authenticated user claims.
    # Multiple plugins can be configured and are evaluated in order.
    # Uncomment and configure the plugins you want to use.
    #
    # authorization_plugins:
    #   # Role-based authorization using roles.yml and roles_mapping.yml
