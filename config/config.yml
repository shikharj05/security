---

# This is the main OpenSearch Security configuration file where authentication
# and authorization is defined.
#
# PLUGIN ARCHITECTURE (NEW):
# OpenSearch Security now supports a new plugin architecture with clear separation
# between authentication (identity verification) and authorization (access control).
#
# Authentication plugins verify user credentials and extract claims (roles, attributes).
# Authorization plugins make access control decisions based on authenticated user claims.
#
# You can configure authentication and authorization plugins independently, allowing
# flexible mixing and matching of implementations.
#
# BACKWARD COMPATIBILITY:
# The legacy authentication_backend and authorization_backend configuration format
# is still supported and will be automatically converted to the new plugin format.
# Both formats can coexist during migration.
#
# MIGRATION:
# See PLUGIN_MIGRATION_GUIDE.md for detailed migration instructions.
#
# You need to configure at least one authentication domain in the authc of this file.
# An authentication domain is responsible for extracting the user credentials from
# the request and for validating them against an authentication backend like Active Directory for example.
#
# If more than one authentication domain is configured the first one which succeeds wins.
# If all authentication domains fail then the request is unauthenticated.
# In this case an exception is thrown and/or the HTTP status is set to 401.
#
# After authentication authorization (authz) will be applied. There can be zero or more authorizers which collect
# the roles from a given backend for the authenticated user.
#
# Both, authc and auth can be enabled/disabled separately for REST and TRANSPORT layer. Default is true for both.
#        http_enabled: true
#        transport_enabled: true
#
# For HTTP it is possible to allow anonymous authentication. If that is the case then the HTTP authenticators try to
# find user credentials in the HTTP request. If credentials are found then the user gets regularly authenticated.
# If none can be found the user will be authenticated as an "anonymous" user. This user has always the username "anonymous"
# and one role named "anonymous_backendrole".
# If you enable anonymous authentication all HTTP authenticators will not challenge.
#
#
# Note: If you define more than one HTTP authenticators make sure to put non-challenging authenticators like "proxy" or "clientcert"
# first and the challenging one last.
# Because it's not possible to challenge a client with two different authentication methods (for example
# Kerberos and Basic) only one can have the challenge flag set to true. You can cope with this situation
# by using pre-authentication, e.g. sending a HTTP Basic authentication header in the request.
#
# Default value of the challenge flag is true.
#
#
# HTTP
#   basic (challenging)
#   proxy (not challenging, needs xff)
#   kerberos (challenging)
#   clientcert (not challenging, needs https)
#   jwt (not challenging)
#   host (not challenging) #DEPRECATED, will be removed in a future version.
#                          host based authentication is configurable in roles_mapping

# Authc (Legacy format - still supported)
#   internal
#   noop
#   ldap

# Authz (Legacy format - still supported)
#   ldap
#   noop

# Authentication Plugins (New format - recommended)
#   internal - Internal user database authentication
#   ldap - LDAP/Active Directory authentication
#   saml - SAML 2.0 authentication
#   jwt - JSON Web Token authentication
#   kerberos - Kerberos/SPNEGO authentication

# Authorization Plugins (New format - recommended)
#   role_based - Role-based access control using roles.yml and roles_mapping.yml
#   ldap - LDAP/Active Directory group-based authorization



_meta:
  type: "config"
  config_version: 2

config:
  dynamic:
    # Set filtered_alias_mode to 'disallow' to forbid more than 2 filtered aliases per index
    # Set filtered_alias_mode to 'warn' to allow more than 2 filtered aliases per index but warns about it (default)
    # Set filtered_alias_mode to 'nowarn' to allow more than 2 filtered aliases per index silently
    #filtered_alias_mode: warn
    #do_not_fail_on_forbidden: false
    #kibana:
    # Kibana multitenancy
    #multitenancy_enabled: true
    #private_tenant_enabled: true
    #default_tenant: ""
    #server_username: kibanaserver
    #index: '.kibana'
    http:
      anonymous_auth_enabled: false
      xff:
        enabled: false
        internalProxies: '192\.168\.0\.10|192\.168\.0\.11' # regex pattern
        #internalProxies: '.*' # trust all internal proxies, regex pattern
        #remoteIpHeader:  'x-forwarded-for'
        ###### see https://docs.oracle.com/javase/7/docs/api/java/util/regex/Pattern.html for regex help
        ###### more information about XFF https://en.wikipedia.org/wiki/X-Forwarded-For
        ###### and here https://tools.ietf.org/html/rfc7239
        ###### and https://tomcat.apache.org/tomcat-8.0-doc/config/valve.html#Remote_IP_Valve
    
    # LEGACY AUTHENTICATION CONFIGURATION (still supported)
    # This format is automatically converted to the new plugin architecture internally.
    # For new deployments, consider using the new authentication_plugins format below.
    authc:
      kerberos_auth_domain:
        http_enabled: false
        transport_enabled: false
        order: 6
        http_authenticator:
          type: kerberos
          challenge: true
          config:
            # If true a lot of kerberos/security related debugging output will be logged to standard out
            krb_debug: false
            # If true then the realm will be stripped from the user name
            strip_realm_from_principal: true
        authentication_backend:
          type: noop
      basic_internal_auth_domain:
        description: "Authenticate via HTTP Basic against internal users database"
        http_enabled: true
        transport_enabled: true
        order: 4
        http_authenticator:
          type: basic
          challenge: true
        authentication_backend:
          type: intern
      proxy_auth_domain:
        description: "Authenticate via proxy"
        http_enabled: false
        transport_enabled: false
        order: 3
        http_authenticator:
          type: proxy
          challenge: false
          config:
            user_header: "x-proxy-user"
            roles_header: "x-proxy-roles"
        authentication_backend:
          type: noop
      jwt_auth_domain:
        description: "Authenticate via Json Web Token"
        http_enabled: false
        transport_enabled: false
        order: 0
        http_authenticator:
          type: jwt
          challenge: false
          config:
            jwks_uri: 'https://your-jwks-endpoint.com/.well-known/jwks.json'
            signing_key: "base64 encoded HMAC key or public RSA/ECDSA pem key"
            jwt_header: "Authorization"
            jwt_url_parameter: null
            jwt_clock_skew_tolerance_seconds: 30
            roles_key: null
            subject_key: null
        authentication_backend:
          type: noop
      clientcert_auth_domain:
        description: "Authenticate via SSL client certificates"
        http_enabled: false
        transport_enabled: false
        order: 2
        http_authenticator:
          type: clientcert
          config:
            username_attribute: cn #optional, if omitted DN becomes username
            # skip_users config is used to skip cert based authentication for certain users where they can fall back to other authentication backends
            #skip_users:
            #  - "DC=de,L=test,O=users,OU=bridge,CN=dashboard"

          challenge: false
        authentication_backend:
          type: noop
      ldap:
        description: "Authenticate via LDAP or Active Directory"
        http_enabled: false
        transport_enabled: false
        order: 5
        http_authenticator:
          type: basic
          challenge: false
        authentication_backend:
          # LDAP authentication backend (authenticate users against a LDAP or Active Directory)
          type: ldap
          config:
            # enable ldaps
            enable_ssl: false
            # enable start tls, enable_ssl should be false
            enable_start_tls: false
            # send client certificate
            enable_ssl_client_auth: false
            # verify ldap hostname
            verify_hostnames: true
            hosts:
            - localhost:8389
            bind_dn: null
            password: null
            userbase: 'ou=people,dc=example,dc=com'
            # Filter to search for users (currently in the whole subtree beneath userbase)
            # {0} is substituted with the username
            usersearch: '(sAMAccountName={0})'
            # Use this attribute from the user as username (if not set then DN is used)
            username_attribute: null
    
    # LEGACY AUTHORIZATION CONFIGURATION (still supported)
    # This format is automatically converted to the new plugin architecture internally.
    # For new deployments, consider using the new authorization_plugins format below.
    authz:
      roles_from_myldap:
        description: "Authorize via LDAP or Active Directory"
        http_enabled: false
        transport_enabled: false
        authorization_backend:
          # LDAP authorization backend (gather roles from a LDAP or Active Directory, you have to configure the above LDAP authentication backend settings too)
          type: ldap
          config:
            # enable ldaps
            enable_ssl: false
            # enable start tls, enable_ssl should be false
            enable_start_tls: false
            # send client certificate
            enable_ssl_client_auth: false
            # verify ldap hostname
            verify_hostnames: true
            hosts:
            - localhost:8389
            bind_dn: null
            password: null
            rolebase: 'ou=groups,dc=example,dc=com'
            # Filter to search for roles (currently in the whole subtree beneath rolebase)
            # {0} is substituted with the DN of the user
            # {1} is substituted with the username
            # {2} is substituted with an attribute value from user's directory entry, of the authenticated user. Use userroleattribute to specify the name of the attribute
            rolesearch: '(member={0})'
            # Specify the name of the attribute which value should be substituted with {2} above
            userroleattribute: null
            # Roles as an attribute of the user entry
            userrolename: disabled
            #userrolename: memberOf
            # The attribute in a role entry containing the name of that role, Default is "name".
            # Can also be "dn" to use the full DN as rolename.
            rolename: cn
            # Resolve nested roles transitive (roles which are members of other roles and so on ...)
            resolve_nested_roles: true
            userbase: 'ou=people,dc=example,dc=com'
            # Filter to search for users (currently in the whole subtree beneath userbase)
            # {0} is substituted with the username
            usersearch: '(uid={0})'
            # Skip users matching a user name, a wildcard or a regex pattern
            #skip_users:
            #  - 'cn=Michael Jackson,ou*people,o=TEST'
            #  - '/\S*/'
      roles_from_another_ldap:
        description: "Authorize via another Active Directory"
        http_enabled: false
        transport_enabled: false
        authorization_backend:
          type: ldap
          #config goes here ...
    
    # NEW AUTHENTICATION PLUGIN CONFIGURATION (recommended for new deployments)
    # This format provides better separation of concerns and more flexible configuration.
    # Plugins are evaluated in order until one succeeds.
    # Uncomment and configure the plugins you want to use.
    #
    # authentication_plugins:
    #   # Internal user database authentication
    #   - type: internal
    #     enabled: true
    #     order: 1
    #     description: "Authenticate against internal users database"
    #     config:
    #       # Internal authentication uses internal_users.yml
    #       # No additional configuration needed
    #   
    #   # LDAP authentication with claims extraction
    #   - type: ldap
    #     enabled: false
    #     order: 2
    #     description: "Authenticate via LDAP and extract user claims"
    #     config:
    #       # LDAP connection settings
    #       enable_ssl: false
    #       enable_start_tls: false
    #       enable_ssl_client_auth: false
    #       verify_hostnames: true
    #       hosts:
    #         - ldap.example.com:389
    #       bind_dn: cn=admin,dc=example,dc=com
    #       password: password
    #       
    #       # User search settings
    #       userbase: 'ou=people,dc=example,dc=com'
    #       usersearch: '(uid={0})'
    #       username_attribute: uid
    #       
    #       # Claims mapping - map LDAP attributes to claim names
    #       claims_mapping:
    #         backend_roles: memberOf  # Extract group memberships as backend_roles
    #         email: mail              # Extract email attribute
    #         display_name: displayName
    #         department: department
    #         employee_id: employeeNumber
    #   
    #   # SAML authentication with attribute mapping
    #   - type: saml
    #     enabled: false
    #     order: 3
    #     description: "Authenticate via SAML 2.0"
    #     config:
    #       # SAML IdP settings
    #       idp_metadata_url: https://idp.example.com/metadata
    #       sp_entity_id: https://opensearch.example.com
    #       
    #       # SAML attribute mapping - map SAML attributes to claim names
    #       claims_mapping:
    #         backend_roles: http://schemas.xmlsoap.org/ws/2005/05/identity/claims/groups
    #         email: http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress
    #         display_name: http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name
    #   
    #   # JWT authentication
    #   - type: jwt
    #     enabled: false
    #     order: 4
    #     description: "Authenticate via JSON Web Token"
    #     config:
    #       jwks_uri: https://your-jwks-endpoint.com/.well-known/jwks.json
    #       signing_key: "base64 encoded HMAC key or public RSA/ECDSA pem key"
    #       jwt_header: Authorization
    #       jwt_url_parameter: null
    #       jwt_clock_skew_tolerance_seconds: 30
    #       
    #       # Claims mapping - map JWT claims to standard claim names
