    #     enabled: false
    #     description: "LDAP group-based authorization"
    #     config:
    #       # LDAP connection settings (can reuse authentication settings)
    #       enable_ssl: false
    #       hosts:
    #         - ldap.example.com:389
    #       bind_dn: cn=admin,dc=example,dc=com
    #       password: password
    #       
    #       # Role search settings
    #       rolebase: 'ou=groups,dc=example,dc=com'
    #       rolesearch: '(member={0})'
    #       rolename: cn
    #       resolve_nested_roles: true
    #       
    #       # Map LDAP groups to security roles
    #       role_mapping:
    #         admin:
    #           ldap_groups:
